name: Docker Build

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-service
            context: api-service
            file: api-service/Dockerfile
          - name: converter-service
            context: converter-service
            file: converter-service/Dockerfile
          - name: fetcher-service
            context: fetcher-service
            file: fetcher-service/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false

